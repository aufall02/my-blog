<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="#000000" />
  
  <!-- Text "{A}" -->
  <text 
    x="50%" 
    y="55%" 
    dominant-baseline="middle" 
    text-anchor="middle" 
    fill="#FFFFFF" 
    font-family="system-ui, -apple-system, sans-serif" 
    font-weight="bold" 
    font-size="60px"
    letter-spacing="-2px"
  >
    {A}
  </text>
  
  <style>
    @media (prefers-color-scheme: dark) {
      rect { fill: #FFFFFF; }
      text { fill: #000000; }
    }
  </style>
</svg>
